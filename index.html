<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }

        .tab-active {
            background: #4f00ff !important;
            color: white !important;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f00ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #dashboard {
            display: none;
        }
    </style>

</head>

<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">

        <div class="bg-white p-10 rounded-xl shadow-sm border w-full max-w-[440px]">

            <h1 class="text-xl font-bold text-center mb-6">
                GitHub Issues Tracker
            </h1>

            <form id="loginForm" class="space-y-4">

                <input id="username" placeholder="Username" class="w-full border px-3 py-2 rounded">

                <input id="password" type="password" placeholder="Password" class="w-full border px-3 py-2 rounded">

                <button class="w-full bg-[#4f00ff] text-white py-2 rounded">
                    Sign In
                </button>

            </form>

        </div>
    </div>

    <div id="dashboard">

        <nav class="bg-white border-b px-10 py-4 flex justify-between">

            <span class="font-bold">
                GitHub Issues Tracker
            </span>

            <input id="searchInput" placeholder="Search issues..." class="border px-3 py-1 rounded">

        </nav>

        <main class="max-w-7xl mx-auto p-10">

            <h2 class="text-xl font-bold">
                Issues
            </h2>

        </main>

    </div>

    <div class="flex gap-3 mb-6">

        <button id="tab-all" onclick="filterTab('all')" class="tab-active px-4 py-1 bg-gray-100 rounded">
            All
        </button>

        <button id="tab-open" onclick="filterTab('open')" class="px-4 py-1 bg-gray-100 rounded">
            Open
        </button>

        <button id="tab-closed" onclick="filterTab('closed')" class="px-4 py-1 bg-gray-100 rounded">
            Closed
        </button>

    </div>

    <h2 class="text-2xl font-bold">
        <span id="count">0</span> Issues
    </h2>

    <div id="loader" class="flex justify-center py-20 hidden">
        <div class="loader"></div>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    </div>

    <script>

        let issuesStore = [];

        const loginForm = document.getElementById('loginForm');
        const loginPage = document.getElementById('loginPage');
        const dashboard = document.getElementById('dashboard');

        loginForm.addEventListener('submit', (e) => {

            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {

                loginPage.style.display = 'none';
                dashboard.style.display = 'block';

                fetchIssues();

            } else {

                alert('Invalid Credentials');

            }

        });

        async function fetchIssues() {

            const res = await fetch(
                'https://phi-lab-server.vercel.app/api/v1/lab/issues'
            );

            const data = await res.json();

            issuesStore = data.data || data;

        }

    </script>

</body>

</html>
