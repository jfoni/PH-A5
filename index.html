<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }

        .tab-active {
            background: #4f00ff !important;
            color: white !important;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f00ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #dashboard {
            display: none;
        }
    </style>

</head>

<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">

        <div class="bg-white p-10 rounded-xl shadow-sm border w-full max-w-[440px]">

            <h1 class="text-xl font-bold text-center mb-6">
                GitHub Issues Tracker
            </h1>

            <form id="loginForm" class="space-y-4">

                <input id="username" placeholder="Username" class="w-full border px-3 py-2 rounded">

                <input id="password" type="password" placeholder="Password" class="w-full border px-3 py-2 rounded">

                <button class="w-full bg-[#4f00ff] text-white py-2 rounded">
                    Sign In
                </button>

            </form>

        </div>
    </div>

</body>

</html>
